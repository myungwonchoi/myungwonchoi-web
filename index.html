<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenderTracker - Plugin Guide</title>
    <meta name="description"
        content="Official guide for the RenderTracker plugin. Learn how to track your rendering progress efficiently.">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<body>
    <header class="topbar">
        <div class="topbar-inner">
            <span class="topbar-title">dding_one</span>
            <nav class="topbar-nav" aria-label="Main navigation">
                <a class="topbar-nav-link" id="nav-about" href="#/about/about.md" data-nav="about">About</a>
                <a class="topbar-nav-link" id="nav-plugins" href="#" data-nav="plugins">Plugins</a>
                <a class="topbar-nav-link" id="nav-support" href="#/common/support.md" data-nav="support">Support</a>
            </nav>
            <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language selector">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn active" data-lang="ko">KO</button>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="plugin-selector">
                    <div class="plugin-dropdown" id="plugin-dropdown">
                        <button class="plugin-dropdown-btn" id="plugin-dropdown-btn" aria-haspopup="listbox"
                            aria-expanded="false">
                            <span id="plugin-dropdown-label"><!-- populated by script.js --></span>
                            <svg class="plugin-dropdown-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none"
                                xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </button>
                        <ul class="plugin-dropdown-menu" id="plugin-dropdown-menu" role="listbox">
                            <!-- populated by script.js -->
                        </ul>
                    </div>
                </div>
                <nav aria-label="Document navigation">
                    <ul id="menu-list">
                        <!-- populated by script.js -->
                    </ul>
                </nav>
            </div>
        </aside>

        <main class="content">
            <div id="markdown-viewer" role="main">Select a topic to get started.</div>
        </main>
    </div>

    <div id="qr-popup" style="display:none" role="dialog" aria-modal="true" aria-label="QR Code">
        <div id="qr-popup-box">
            <button id="qr-popup-close" onclick="closeQRPopup()" aria-label="Close">✕</button>
            <img id="qr-popup-img" src="" alt="QR Code">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
